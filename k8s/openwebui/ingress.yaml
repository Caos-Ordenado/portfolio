apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openwebui-ingress
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    # Host-based private access (Tailscale/VPN): add `<TAILSCALE_IP> webui.home.server` to /etc/hosts
    - match: Host(`webui.home.server`)
      kind: Rule
      priority: 300
      services:
        - name: openwebui
          namespace: default
          port: 8080

    # Back-compat: public path-based access at www.reyops.com/webui
    - match: Host(`www.reyops.com`) && PathPrefix(`/webui`)
      kind: Rule
      priority: 210
      middlewares:
        - name: webui-stripprefix
          namespace: default
      services:
        - name: openwebui
          namespace: default
          port: 8080
